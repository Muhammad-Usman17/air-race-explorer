services:
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: air-race-api
    environment:
      NODE_ENV: production
      PORT: 3000
    ports:
      - "3000:3000"
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    container_name: air-race-web
    ports:
      - "80:80"
    depends_on:
      - api
    restart: unless-stopped
