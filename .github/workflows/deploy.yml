name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Railway deployment is handled automatically via GitHub repo connection.
# Connect your repo at railway.app → New Project → Deploy from GitHub repo.
# Railway will auto-deploy on every push to main after this CI passes.

jobs:
  test-api:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test --workspace=apps/api

  test-web:
    name: Test Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - run: npm test --workspace=apps/web
